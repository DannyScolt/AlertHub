basePath: /api/v1
definitions:
  alert.AlertPaginationMeta:
    properties:
      has_next:
        example: true
        type: boolean
      has_previous:
        example: false
        type: boolean
      page:
        example: 1
        type: integer
      page_size:
        example: 20
        type: integer
      total:
        example: 100
        type: integer
      total_pages:
        example: 5
        type: integer
    type: object
  alert.AlertResponse:
    properties:
      device_id:
        example: 4d285f4b-2a87-4a86-a5b8-05b09c6d1234
        type: string
      id:
        example: 9f3d2e1a-1234-4321-abcd-1234567890ab
        type: string
      message:
        example: Temperature exceeded 80°C
        type: string
      occurred_at:
        type: string
      payload:
        additionalProperties: true
        type: object
      received_at:
        type: string
      severity:
        example: warning
        type: string
      type:
        example: high_temperature
        type: string
    type: object
  alert.BatchAcceptedAlert:
    properties:
      alert_id:
        example: 9f3d2e1a-1234-4321-abcd-1234567890ab
        type: string
      index:
        example: 0
        type: integer
    type: object
  alert.BatchEnvelopeResponse:
    properties:
      data:
        $ref: '#/definitions/alert.BatchResponse'
      message:
        example: Batch processed
        type: string
      status:
        example: true
        type: boolean
    type: object
  alert.BatchError:
    properties:
      code:
        example: INVALID_SEVERITY
        type: string
      index:
        example: 5
        type: integer
      message:
        example: severity must be one of info, warning, critical
        type: string
    type: object
  alert.BatchRequest:
    properties:
      events:
        items:
          $ref: '#/definitions/alert.IngestRequest'
        type: array
    required:
    - events
    type: object
  alert.BatchResponse:
    properties:
      accepted:
        example: 98
        type: integer
      alerts:
        items:
          $ref: '#/definitions/alert.BatchAcceptedAlert'
        type: array
      errors:
        items:
          $ref: '#/definitions/alert.BatchError'
        type: array
      rejected:
        example: 2
        type: integer
    type: object
  alert.IngestEnvelopeResponse:
    properties:
      data:
        $ref: '#/definitions/alert.IngestResponse'
      message:
        example: Event accepted
        type: string
      status:
        example: true
        type: boolean
    type: object
  alert.IngestRequest:
    properties:
      message:
        example: Temperature exceeded 80°C
        type: string
      occurred_at:
        example: "2026-05-03T12:00:00Z"
        type: string
      payload:
        additionalProperties: true
        type: object
      severity:
        example: warning
        type: string
      type:
        example: high_temperature
        type: string
    required:
    - message
    - severity
    - type
    type: object
  alert.IngestResponse:
    properties:
      alert_id:
        example: 9f3d2e1a-1234-4321-abcd-1234567890ab
        type: string
      received_at:
        example: "2026-05-03T12:00:00.123Z"
        type: string
    type: object
  alert.ListAlertsResponse:
    properties:
      data:
        items:
          $ref: '#/definitions/alert.AlertResponse'
        type: array
      message:
        example: Alerts retrieved successfully
        type: string
      pagination:
        $ref: '#/definitions/alert.AlertPaginationMeta'
      status:
        example: true
        type: boolean
    type: object
  alert.StreamAlertEvent:
    properties:
      device_id:
        example: 4d285f4b-2a87-4a86-a5b8-05b09c6d1234
        type: string
      id:
        example: 9f3d2e1a-1234-4321-abcd-1234567890ab
        type: string
      message:
        example: Temperature exceeded 80°C
        type: string
      occurred_at:
        example: "2026-05-03T12:00:00Z"
        type: string
      payload:
        additionalProperties: true
        type: object
      received_at:
        example: "2026-05-03T12:00:00.123Z"
        type: string
      severity:
        example: warning
        type: string
      type:
        example: high_temperature
        type: string
    type: object
  auth.AuthData:
    properties:
      access_token:
        example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        type: string
      expires_in:
        example: 900
        type: integer
      refresh_token:
        example: ah_refresh_2P8mYwD9kYf3nQxV7bA1cE4rT6uI0oPz
        type: string
      token_type:
        example: Bearer
        type: string
    type: object
  auth.AuthResponse:
    properties:
      data:
        $ref: '#/definitions/auth.AuthData'
      message:
        example: Login successful
        type: string
      status:
        example: true
        type: boolean
    type: object
  auth.LoginRequest:
    properties:
      email:
        example: client@example.com
        type: string
      password:
        example: password123
        type: string
    required:
    - email
    - password
    type: object
  auth.RefreshTokenRequest:
    properties:
      refresh_token:
        example: ah_refresh_2P8mYwD9kYf3nQxV7bA1cE4rT6uI0oPz
        type: string
    required:
    - refresh_token
    type: object
  auth.RegisterRequest:
    properties:
      email:
        example: client@example.com
        type: string
      name:
        example: Demo Client
        type: string
      password:
        example: password123
        minLength: 8
        type: string
    required:
    - email
    - name
    - password
    type: object
  auth.SessionResponse:
    properties:
      created_at:
        type: string
      expires_at:
        type: string
      id:
        example: 9fe9e122-bfb1-4f3b-a2d0-f4acdd4cbd2d
        type: string
      ip_address:
        example: 127.0.0.1
        type: string
      last_used_at:
        type: string
      revoke_reason:
        example: logout
        type: string
      revoked_at:
        type: string
      token_family:
        example: 0f1f1c17-f9e6-42f3-9341-1555a07ddf4e
        type: string
      user_agent:
        example: Mozilla/5.0
        type: string
    type: object
  auth.SessionsResponse:
    properties:
      data:
        items:
          $ref: '#/definitions/auth.SessionResponse'
        type: array
      message:
        example: Sessions retrieved successfully
        type: string
      status:
        example: true
        type: boolean
    type: object
  client.ClientResponse:
    properties:
      created_at:
        type: string
      email:
        example: client@example.com
        type: string
      id:
        example: 8c5c8a5e-6b74-48b4-9e0b-85a0c9ef1234
        type: string
      name:
        example: Acme Inc
        type: string
      updated_at:
        type: string
    type: object
  client.MeResponse:
    properties:
      data:
        $ref: '#/definitions/client.ClientResponse'
      message:
        example: Client retrieved successfully
        type: string
      status:
        example: true
        type: boolean
    type: object
  common.APIResponse:
    properties:
      data: {}
      message:
        example: Success
        type: string
      status:
        example: true
        type: boolean
    type: object
  common.ErrorBody:
    properties:
      code:
        example: VALIDATION_ERROR
        type: string
      details: {}
    type: object
  common.ErrorResponse:
    properties:
      error:
        $ref: '#/definitions/common.ErrorBody'
      message:
        example: Request validation failed
        type: string
      status:
        example: false
        type: boolean
    type: object
  device.CreateDeviceEnvelopeResponse:
    properties:
      data:
        $ref: '#/definitions/device.DeviceWithAPIKeyResponse'
      message:
        example: Device created successfully
        type: string
      status:
        example: true
        type: boolean
    type: object
  device.CreateDeviceRequest:
    properties:
      metadata:
        additionalProperties: true
        type: object
      name:
        example: Warehouse Temperature Sensor
        type: string
      status:
        example: active
        type: string
      tags:
        example:
        - warehouse
        - floor-1
        items:
          type: string
        type: array
      type:
        example: temperature_sensor
        type: string
    required:
    - name
    - type
    type: object
  device.DeleteDeviceEnvelopeResponse:
    properties:
      data:
        $ref: '#/definitions/device.DeleteDeviceResponse'
      message:
        example: Device deleted successfully
        type: string
      status:
        example: true
        type: boolean
    type: object
  device.DeleteDeviceResponse:
    properties:
      deleted_at:
        type: string
      id:
        example: 4d285f4b-2a87-4a86-a5b8-05b09c6d1234
        type: string
      purge_after:
        type: string
    type: object
  device.DeviceEnvelopeResponse:
    properties:
      data:
        $ref: '#/definitions/device.DeviceResponse'
      message:
        example: Device retrieved successfully
        type: string
      status:
        example: true
        type: boolean
    type: object
  device.DeviceResponse:
    properties:
      created_at:
        type: string
      deleted_at:
        type: string
      id:
        example: 4d285f4b-2a87-4a86-a5b8-05b09c6d1234
        type: string
      last_seen_at:
        type: string
      metadata:
        additionalProperties: true
        type: object
      name:
        example: Warehouse Temperature Sensor
        type: string
      status:
        example: active
        type: string
      tags:
        example:
        - warehouse
        - floor-1
        items:
          type: string
        type: array
      type:
        example: temperature_sensor
        type: string
      updated_at:
        type: string
    type: object
  device.DeviceWithAPIKeyResponse:
    properties:
      api_key:
        example: ah_dev_uTx9s6Cq54wIhj3YgVSLW7B9sPlmY2xL
        type: string
      created_at:
        type: string
      id:
        example: 4d285f4b-2a87-4a86-a5b8-05b09c6d1234
        type: string
      name:
        example: Warehouse Temperature Sensor
        type: string
      status:
        example: active
        type: string
      type:
        example: temperature_sensor
        type: string
      updated_at:
        type: string
    type: object
  device.ListDevicesResponse:
    properties:
      data:
        items:
          $ref: '#/definitions/device.DeviceResponse'
        type: array
      message:
        example: Devices retrieved successfully
        type: string
      pagination:
        $ref: '#/definitions/device.PaginationMeta'
      status:
        example: true
        type: boolean
    type: object
  device.PaginationMeta:
    properties:
      has_next:
        example: true
        type: boolean
      has_previous:
        example: false
        type: boolean
      page:
        example: 1
        type: integer
      page_size:
        example: 20
        type: integer
      total:
        example: 100
        type: integer
      total_pages:
        example: 5
        type: integer
    type: object
  device.RotateDeviceAPIKeyEnvelopeResponse:
    properties:
      data:
        $ref: '#/definitions/device.RotateDeviceAPIKeyResponse'
      message:
        example: Device API key rotated successfully
        type: string
      status:
        example: true
        type: boolean
    type: object
  device.RotateDeviceAPIKeyResponse:
    properties:
      api_key:
        example: ah_dev_zr9v7X2kLj8QmP4eNs6CbT1aYw3Fh5Ux
        type: string
      id:
        example: 4d285f4b-2a87-4a86-a5b8-05b09c6d1234
        type: string
      rotated_at:
        type: string
    type: object
  device.UpdateDeviceRequest:
    properties:
      metadata:
        additionalProperties: true
        type: object
      name:
        example: Warehouse Temperature Sensor v2
        type: string
      status:
        example: maintenance
        type: string
      tags:
        example:
        - warehouse
        - floor-1
        items:
          type: string
        type: array
      type:
        example: temperature_sensor
        type: string
    type: object
info:
  contact: {}
  description: AlertHub IoT device management and realtime alert ingestion API for
    Backlog 1 and Backlog 2.
  title: AlertHub API
  version: "1.0"
paths:
  /alerts:
    get:
      description: Returns paginated alerts owned by the authenticated client (Backlog
        3). Filter by `device_id`, one or more `severity` values (`info`, `warning`,
        `critical`), and a time range on `occurred_at` using `from` and `to` in RFC3339.
        Results are scoped to the current client and ordered by `occurred_at DESC,
        id DESC`. The response never includes `client_id` or any device API key material.
      parameters:
      - description: Filter to a single device id (UUID)
        example: 4d285f4b-2a87-4a86-a5b8-05b09c6d1234
        in: query
        name: device_id
        type: string
      - collectionFormat: multi
        description: Filter by severity. Repeat to combine, e.g. severity=warning&severity=critical
        in: query
        items:
          enum:
          - info
          - warning
          - critical
          type: string
        name: severity
        type: array
      - description: Inclusive lower bound on occurred_at, RFC3339
        example: "2026-05-01T00:00:00Z"
        in: query
        name: from
        type: string
      - description: Inclusive upper bound on occurred_at, RFC3339
        example: "2026-05-04T23:59:59Z"
        in: query
        name: to
        type: string
      - default: 1
        description: Page number, starts at 1
        in: query
        minimum: 1
        name: page
        type: integer
      - default: 20
        description: Items per page
        in: query
        maximum: 100
        minimum: 1
        name: page_size
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Alerts retrieved successfully with pagination metadata.
          schema:
            $ref: '#/definitions/alert.ListAlertsResponse'
        "400":
          description: Validation error on filters or pagination.
          schema:
            $ref: '#/definitions/common.ErrorResponse'
        "401":
          description: Missing or invalid access token.
          schema:
            $ref: '#/definitions/common.ErrorResponse'
      security:
      - BearerAuth: []
      summary: List alerts for the authenticated client
      tags:
      - Alerts
  /alerts/stream:
    get:
      description: 'Opens an SSE connection for the authenticated client. Use client
        JWT auth (`Authorization: Bearer <access_token>`), not a device API key. The
        stream immediately sends `event: connected`, then sends `event: alert` whenever
        one of the client''s devices ingests an alert, and sends `event: heartbeat`
        every 30 seconds to keep the connection alive. Optional `device_id` filters
        alerts to one device owned by the client. Events from other clients are never
        delivered.'
      parameters:
      - description: Optional device UUID filter. When set, only alerts for this device
          are sent.
        example: 4d285f4b-2a87-4a86-a5b8-05b09c6d1234
        in: query
        name: device_id
        type: string
      produces:
      - text/event-stream
      responses:
        "200":
          description: 'SSE stream. Event types: connected, alert, heartbeat.'
          schema:
            $ref: '#/definitions/alert.StreamAlertEvent'
        "400":
          description: Invalid device_id query parameter.
          schema:
            $ref: '#/definitions/common.ErrorResponse'
        "401":
          description: Missing or invalid client access token.
          schema:
            $ref: '#/definitions/common.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Stream realtime alerts to an authenticated client with Server-Sent
        Events
      tags:
      - Alerts
  /auth/login:
    post:
      consumes:
      - application/json
      description: Authenticates by email and password. The response returns a short-lived
        JWT access token plus an opaque refresh token. Invalid email and invalid password
        both return the same unauthorized response so credential existence is not
        leaked.
      parameters:
      - description: 'Client login payload. Development demo credentials: client@example.com
          / password123.'
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/auth.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Login successful; use data.access_token in the BearerAuth authorize
            button.
          schema:
            $ref: '#/definitions/auth.AuthResponse'
        "400":
          description: Validation error.
          schema:
            $ref: '#/definitions/common.ErrorResponse'
        "401":
          description: Invalid credentials.
          schema:
            $ref: '#/definitions/common.ErrorResponse'
      summary: Login an existing client and issue tokens
      tags:
      - Auth
  /auth/logout:
    post:
      description: 'Revokes active client-token sessions for the authenticated client.
        Send only `Authorization: Bearer <access_token>`; no request body is required.'
      produces:
      - application/json
      responses:
        "200":
          description: Logout successful.
          schema:
            $ref: '#/definitions/common.APIResponse'
        "401":
          description: Missing or invalid access token.
          schema:
            $ref: '#/definitions/common.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Logout the current authenticated client
      tags:
      - Auth
  /auth/logout-all:
    post:
      description: Revokes every active client-token session owned by the authenticated
        client. Use this when the client wants to sign out from all devices/browsers.
      produces:
      - application/json
      responses:
        "200":
          description: All sessions logged out successfully.
          schema:
            $ref: '#/definitions/common.APIResponse'
        "401":
          description: Missing or invalid access token.
          schema:
            $ref: '#/definitions/common.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Logout all sessions for the current client
      tags:
      - Auth
  /auth/refresh:
    post:
      consumes:
      - application/json
      description: Exchanges a valid refresh_token for a new access_token and refresh_token.
        The submitted refresh token is marked used/replaced; reusing an old replaced
        refresh token revokes its token family and returns 401.
      parameters:
      - description: Refresh payload containing the raw refresh_token from register/login/previous
          refresh.
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/auth.RefreshTokenRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Token refreshed successfully; replace the old refresh_token
            with the new one.
          schema:
            $ref: '#/definitions/auth.AuthResponse'
        "400":
          description: Validation error, such as missing refresh_token.
          schema:
            $ref: '#/definitions/common.ErrorResponse'
        "401":
          description: Invalid, expired, revoked, or reused refresh token.
          schema:
            $ref: '#/definitions/common.ErrorResponse'
      summary: Rotate a refresh token and issue a new access token
      tags:
      - Auth
  /auth/register:
    post:
      consumes:
      - application/json
      description: 'Creates a client account with name, unique email, and password.
        The response intentionally returns only access_token, refresh_token, token_type,
        and expires_in; it does not return client profile data. Use the access token
        as `Authorization: Bearer <access_token>` for protected APIs.'
      parameters:
      - description: Client registration payload. Password must be at least 8 characters.
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/auth.RegisterRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Client registered successfully; refresh_token is shown only
            in this response and is stored server-side only as a hash in client_tokens.
          schema:
            $ref: '#/definitions/auth.AuthResponse'
        "400":
          description: Validation error, such as invalid email or short password.
          schema:
            $ref: '#/definitions/common.ErrorResponse'
        "409":
          description: Email already exists.
          schema:
            $ref: '#/definitions/common.ErrorResponse'
      summary: Register a new client and issue tokens
      tags:
      - Auth
  /auth/sessions:
    get:
      description: Returns active and historical client-token sessions for the authenticated
        client. Raw refresh tokens and token hashes are never returned; only safe
        session metadata such as id, token_family, timestamps, user_agent, and ip_address
        are exposed.
      produces:
      - application/json
      responses:
        "200":
          description: Sessions retrieved successfully. Use a session id from this
            response with DELETE /auth/sessions/{id}.
          schema:
            $ref: '#/definitions/auth.SessionsResponse'
        "401":
          description: Missing or invalid access token.
          schema:
            $ref: '#/definitions/common.ErrorResponse'
      security:
      - BearerAuth: []
      summary: List current client's token sessions
      tags:
      - Auth
  /auth/sessions/{id}:
    delete:
      description: Revokes a single session owned by the authenticated client. The
        id must come from GET /auth/sessions. Revocation is scoped by client ownership,
        so a client cannot revoke another client's session.
      parameters:
      - description: Session ID from GET /auth/sessions
        example: 9fe9e122-bfb1-4f3b-a2d0-f4acdd4cbd2d
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Session revoked successfully.
          schema:
            $ref: '#/definitions/common.APIResponse'
        "400":
          description: Invalid session id.
          schema:
            $ref: '#/definitions/common.ErrorResponse'
        "401":
          description: Missing/invalid access token or session does not belong to
            the client.
          schema:
            $ref: '#/definitions/common.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Revoke one client-token session
      tags:
      - Auth
  /clients/me:
    get:
      description: Returns the profile for the client identified by the Bearer access
        token. This endpoint never returns password hashes, refresh tokens, or client_tokens
        records.
      produces:
      - application/json
      responses:
        "200":
          description: Current client profile.
          schema:
            $ref: '#/definitions/client.MeResponse'
        "401":
          description: Missing or invalid access token.
          schema:
            $ref: '#/definitions/common.ErrorResponse'
        "404":
          description: Authenticated client no longer exists.
          schema:
            $ref: '#/definitions/common.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get the authenticated client profile
      tags:
      - Client
  /devices:
    get:
      description: 'Returns paginated devices for the current client. By default soft-deleted
        devices are hidden. Use `status` to satisfy Backlog 1 filtering by device
        status; combine with `type` when needed. Allowed status values: active, inactive,
        maintenance, error. Allowed type values: temperature_sensor, humidity_sensor,
        smoke_detector, motion_sensor, door_sensor, camera, gateway, other.'
      parameters:
      - description: 'Filter by device status: active, inactive, maintenance, error'
        enum:
        - active
        - inactive
        - maintenance
        - error
        in: query
        name: status
        type: string
      - description: Filter by device type
        enum:
        - temperature_sensor
        - humidity_sensor
        - smoke_detector
        - motion_sensor
        - door_sensor
        - camera
        - gateway
        - other
        in: query
        name: type
        type: string
      - default: false
        description: Set true to include soft-deleted devices
        in: query
        name: include_deleted
        type: boolean
      - default: 1
        description: Page number, starts at 1
        in: query
        minimum: 1
        name: page
        type: integer
      - default: 20
        description: Items per page
        in: query
        maximum: 100
        minimum: 1
        name: page_size
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Devices retrieved successfully with pagination metadata.
          schema:
            $ref: '#/definitions/device.ListDevicesResponse'
        "400":
          description: Invalid status, type, or pagination input.
          schema:
            $ref: '#/definitions/common.ErrorResponse'
        "401":
          description: Missing or invalid access token.
          schema:
            $ref: '#/definitions/common.ErrorResponse'
      security:
      - BearerAuth: []
      summary: List devices owned by the authenticated client
      tags:
      - Devices
    post:
      consumes:
      - application/json
      description: 'Creates an IoT device owned by the current client. `type` must
        be one of: temperature_sensor, humidity_sensor, smoke_detector, motion_sensor,
        door_sensor, camera, gateway, other. `status` is optional and defaults to
        active; allowed values are active, inactive, maintenance, error. Device names
        must be unique per client among non-deleted devices. The generated api_key
        is returned only once in this response and only its hash is stored.'
      parameters:
      - description: Device registration payload. tags and metadata are optional.
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/device.CreateDeviceRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Device created successfully; save data.api_key because it cannot
            be retrieved later.
          schema:
            $ref: '#/definitions/device.CreateDeviceEnvelopeResponse'
        "400":
          description: Validation error, invalid device type, or invalid status.
          schema:
            $ref: '#/definitions/common.ErrorResponse'
        "401":
          description: Missing or invalid access token.
          schema:
            $ref: '#/definitions/common.ErrorResponse'
        "409":
          description: A non-deleted device with the same name already exists for
            this client.
          schema:
            $ref: '#/definitions/common.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Register a new device for the authenticated client
      tags:
      - Devices
  /devices/{id}:
    delete:
      description: Soft deletes a device owned by the authenticated client by setting
        deleted_at. Deleted devices are hidden from normal list/detail APIs. The response
        includes purge_after, which is the point after the configured restore window.
      parameters:
      - description: Device ID
        example: 4d285f4b-2a87-4a86-a5b8-05b09c6d1234
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Device deleted successfully; data.deleted_at and data.purge_after
            describe the deletion lifecycle.
          schema:
            $ref: '#/definitions/device.DeleteDeviceEnvelopeResponse'
        "400":
          description: Invalid device id.
          schema:
            $ref: '#/definitions/common.ErrorResponse'
        "401":
          description: Missing or invalid access token.
          schema:
            $ref: '#/definitions/common.ErrorResponse'
        "404":
          description: Device not found for this client.
          schema:
            $ref: '#/definitions/common.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Soft delete a device
      tags:
      - Devices
    get:
      description: Returns a non-deleted device owned by the authenticated client.
        Soft-deleted devices are not returned by this endpoint unless they are restored
        first.
      parameters:
      - description: Device ID
        example: 4d285f4b-2a87-4a86-a5b8-05b09c6d1234
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Device retrieved successfully.
          schema:
            $ref: '#/definitions/device.DeviceEnvelopeResponse'
        "400":
          description: Invalid device id.
          schema:
            $ref: '#/definitions/common.ErrorResponse'
        "401":
          description: Missing or invalid access token.
          schema:
            $ref: '#/definitions/common.ErrorResponse'
        "404":
          description: Device not found for this client or device is soft-deleted.
          schema:
            $ref: '#/definitions/common.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get one device by ID
      tags:
      - Devices
    patch:
      consumes:
      - application/json
      description: 'Partially updates a non-deleted device owned by the authenticated
        client. Send only the fields you want to change. Allowed status values: active,
        inactive, maintenance, error. Allowed type values: temperature_sensor, humidity_sensor,
        smoke_detector, motion_sensor, door_sensor, camera, gateway, other. Device
        name uniqueness is enforced per client among non-deleted devices.'
      parameters:
      - description: Device ID
        example: 4d285f4b-2a87-4a86-a5b8-05b09c6d1234
        in: path
        name: id
        required: true
        type: string
      - description: Partial update payload. Omitted fields keep their existing values.
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/device.UpdateDeviceRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Device updated successfully.
          schema:
            $ref: '#/definitions/device.DeviceEnvelopeResponse'
        "400":
          description: Invalid device id, invalid type/status, validation error, or
            deleted device cannot be changed.
          schema:
            $ref: '#/definitions/common.ErrorResponse'
        "401":
          description: Missing or invalid access token.
          schema:
            $ref: '#/definitions/common.ErrorResponse'
        "404":
          description: Device not found for this client.
          schema:
            $ref: '#/definitions/common.ErrorResponse'
        "409":
          description: Updated name conflicts with another active device owned by
            the client.
          schema:
            $ref: '#/definitions/common.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Update a device
      tags:
      - Devices
  /devices/{id}/restore:
    post:
      description: Restores a device deleted within the configured restore window.
        Restored devices are set to inactive so the client can review them before
        using them again. Restore can fail if another active device now uses the same
        name.
      parameters:
      - description: Device ID
        example: 4d285f4b-2a87-4a86-a5b8-05b09c6d1234
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Device restored successfully; restored status is inactive.
          schema:
            $ref: '#/definitions/device.DeviceEnvelopeResponse'
        "400":
          description: Invalid device id, device is not deleted, or restore window
            expired.
          schema:
            $ref: '#/definitions/common.ErrorResponse'
        "401":
          description: Missing or invalid access token.
          schema:
            $ref: '#/definitions/common.ErrorResponse'
        "404":
          description: Device not found for this client.
          schema:
            $ref: '#/definitions/common.ErrorResponse'
        "409":
          description: Restore conflicts with another active device name.
          schema:
            $ref: '#/definitions/common.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Restore a soft-deleted device
      tags:
      - Devices
  /devices/{id}/rotate-key:
    post:
      description: Generates a new API key for a non-deleted device owned by the authenticated
        client and replaces the stored hash. The raw api_key is returned only once
        in this response; store it immediately because it cannot be retrieved later.
      parameters:
      - description: Device ID
        example: 4d285f4b-2a87-4a86-a5b8-05b09c6d1234
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Device API key rotated successfully.
          schema:
            $ref: '#/definitions/device.RotateDeviceAPIKeyEnvelopeResponse'
        "400":
          description: Invalid device id or deleted device cannot be changed.
          schema:
            $ref: '#/definitions/common.ErrorResponse'
        "401":
          description: Missing or invalid access token.
          schema:
            $ref: '#/definitions/common.ErrorResponse'
        "404":
          description: Device not found for this client.
          schema:
            $ref: '#/definitions/common.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Rotate a device API key
      tags:
      - Devices
  /events:
    post:
      consumes:
      - application/json
      description: 'Accepts one append-only alert event from an authenticated device.
        Authenticate with the raw device API key returned by POST /devices or POST
        /devices/{id}/rotate-key using `Authorization: Bearer ah_dev_...`. The API
        stores only the alert row, emits a PostgreSQL NOTIFY event for SSE subscribers,
        and never exposes api_key/api_key_hash in the response. `severity` must be
        one of info, warning, critical; `type` is a free string up to 100 characters;
        `payload` is optional JSON metadata; `occurred_at` is optional and defaults
        to server time.'
      parameters:
      - description: 'Single alert payload. Example severity values: info, warning,
          critical.'
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/alert.IngestRequest'
      produces:
      - application/json
      responses:
        "202":
          description: Event accepted; data.alert_id can be used to correlate stream
            events.
          schema:
            $ref: '#/definitions/alert.IngestEnvelopeResponse'
        "400":
          description: 'Validation error: invalid severity, blank type, blank message,
            malformed JSON.'
          schema:
            $ref: '#/definitions/common.ErrorResponse'
        "401":
          description: Missing, invalid, or soft-deleted device API key.
          schema:
            $ref: '#/definitions/common.ErrorResponse'
        "500":
          description: Internal insert or notify error.
          schema:
            $ref: '#/definitions/common.ErrorResponse'
      security:
      - DeviceAPIKey: []
      summary: Ingest one realtime alert event from a device
      tags:
      - Alerts
  /events/batch:
    post:
      consumes:
      - application/json
      description: 'Accepts up to 100 alert events from one authenticated device.
        Valid events are inserted and notified; invalid events are returned in data.errors
        with their original index, so clients can retry only failed items. The response
        can contain both accepted alerts and rejected errors. Authentication uses
        `Authorization: Bearer ah_dev_...` with the raw device API key.'
      parameters:
      - description: Batch payload. events must contain 1..100 items. Partial failure
          is reported per index.
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/alert.BatchRequest'
      produces:
      - application/json
      responses:
        "202":
          description: Batch fully accepted; check data.accepted, data.alerts, and
            data.errors.
          schema:
            $ref: '#/definitions/alert.BatchEnvelopeResponse'
        "207":
          description: Batch partially accepted; check data.accepted, data.rejected,
            data.alerts, and data.errors.
          schema:
            $ref: '#/definitions/alert.BatchEnvelopeResponse'
        "400":
          description: Empty batch, more than 100 events, malformed JSON, or invalid
            batch shape.
          schema:
            $ref: '#/definitions/common.ErrorResponse'
        "401":
          description: Missing, invalid, or soft-deleted device API key.
          schema:
            $ref: '#/definitions/common.ErrorResponse'
        "500":
          description: Internal insert or notify error.
          schema:
            $ref: '#/definitions/common.ErrorResponse'
      security:
      - DeviceAPIKey: []
      summary: Ingest a batch of realtime alert events from a device
      tags:
      - Alerts
  /health:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/common.APIResponse'
      summary: Health check
      tags:
      - Health
securityDefinitions:
  BearerAuth:
    description: 'Client JWT access token. Use value format: Bearer <access_token>.'
    in: header
    name: Authorization
    type: apiKey
  DeviceAPIKey:
    description: 'Device API key returned once when creating or rotating a device.
      Use value format: Bearer ah_dev_...'
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
